services:
  # Spring Boot应用 - 实例1
  vr-classroom-backend-1:
    image: eclipse-temurin:17-jre-alpine
    container_name: vr-classroom-backend-1
    volumes:
      - ./vr-classroom-backend/target/vr-classroom-backend-0.0.1-SNAPSHOT.jar:/app/app.jar:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://192.168.247.150:3306/cj_vr?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: cj
      SPRING_DATASOURCE_PASSWORD: WEOrMSs@rtDeMw@ItoN#_YkLhUyXj167Oq5nLPBvTSQKv06v
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ""
      SPRING_REDIS_DATABASE: 0
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: your_jwt_secret_key_at_least_32_characters_long
      OSS_ENDPOINT: oss-cn-wuhan-lr.aliyuncs.com
      OSS_ACCESS_KEY_ID: your_oss_access_key_id
      OSS_ACCESS_KEY_SECRET: your_oss_access_key_secret
      OSS_BUCKET_NAME: vr-classroom-bucket
      WECHAT_APP_ID: your-wechat-app-id
      WECHAT_APP_SECRET: your-wechat-app-secret
    depends_on:
      redis:
        condition: service_started
      nginx:
        condition: service_started
    restart: unless-stopped
    entrypoint: ["java", "-jar", "/app/app.jar"]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 1G

