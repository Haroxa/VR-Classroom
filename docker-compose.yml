    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '1.5'
        reservations:
          memory: 2G

  # Nginx负载均衡
  nginx:
    image: nginx:alpine
    container_name: vr-classroom-nginx
    ports:
      - "8082:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  # Redis服务
  redis:
    image: redis:7.0-alpine  # 使用 alpine 版本更轻量
    container_name: vr-classroom-redis
    ports:
      - "6380:6379"  # 修改端口，避免与其他可能的 Redis 实例冲突
    volumes:
      - redis-data:/data
    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

# 可选：定义网络（默认已创建，显式定义更清晰）
networks:
  default:
    name: vr-classroom-network
