events {
    worker_connections 2048;
}

http {
    # 自定义日志格式，包含upstream信息
    log_format upstream_log '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'upstream=$upstream_addr '
                           'response_time=$upstream_response_time '
                           'upstream_status=$upstream_status';

    # 高并发优化 - 5个后端实例（万人并发场景）
    upstream vr_backend {
        least_conn;
        server vr-classroom-backend-1:8080 weight=1 max_fails=3 fail_timeout=30s;
        server vr-classroom-backend-2:8080 weight=1 max_fails=3 fail_timeout=30s;
        server vr-classroom-backend-3:8080 weight=1 max_fails=3 fail_timeout=30s;
        server vr-classroom-backend-4:8080 weight=1 max_fails=3 fail_timeout=30s;
        server vr-classroom-backend-5:8080 weight=1 max_fails=3 fail_timeout=30s;
    }

    # WebSocket升级的map配置
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name localhost;

        # 使用自定义日志格式
        access_log /var/log/nginx/vr-classroom-access.log upstream_log;
        error_log /var/log/nginx/vr-classroom-error.log;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        client_max_body_size 50M;

        location / {
            proxy_pass http://vr_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket支持（只在需要时升级）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # 添加响应头，标识处理请求的后端实例
            add_header X-Upstream $upstream_addr always;
        }

        # 静态资源访问 - 图片文件
        location /assets {
            alias /opt/1panel/apps/openresty/openresty/www/sites/vr-static/index;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /health {
            access_log off;
            return 200 "healthy";
            add_header Content-Type text/plain;
        }
    }
}
