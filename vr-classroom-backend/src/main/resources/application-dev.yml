# 开发环境配置
spring:
  # 允许循环依赖
  main:
    allow-circular-references: true

  # 数据源配置
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vr_classroom_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&characterSetResults=utf-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    # 关闭驼峰命名自动转换，使用数据库原生的列名
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 关闭表名下划线转换
      table-underline: false

  # 热部署配置
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  
  # Redis 配置
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:123456}
    database: ${SPRING_REDIS_DATABASE:0}
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

# Swagger配置（开发环境）
swagger:
  server:
    port: 8082  # Swagger文档服务器端口
    url: http://localhost:8082  # 开发环境使用本地URL

# 日志配置
logging:
  level:
    root: info
    com.university.vrclassroombackend: debug
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
  
# 服务器配置
server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /
  tomcat:
    max-threads: 200
    min-spare-threads: 20

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400

# OSS配置
oss:
  endpoint: ${OSS_ENDPOINT}
  accessKeyId: ${OSS_ACCESS_KEY_ID}
  accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
  bucketName: ${OSS_BUCKET_NAME}

# 微信登录配置
wechat:
  appId: ${WECHAT_APP_ID}
  appSecret: ${WECHAT_APP_SECRET}
  code2SessionUrl: https://api.weixin.qq.com/sns/jscode2session
  accessTokenUrl: https://api.weixin.qq.com/cgi-bin/token
  phoneNumberUrl: https://api.weixin.qq.com/wxa/business/getuserphonenumber

# 文件上传配置（开发环境使用本地存储）
file:
  upload:
    path: ./uploads
    server-path: ${FILE_UPLOAD_SERVER_PATH:}
    url: /assets
  static:
    path: /assets/**
    location: file:./uploads/

# 安全配置
management:
  endpoints:
    web:
      exposure:
        include: health,env,metrics,info,beans
  endpoint:
    health:
      show-details: always
    env:
      show-values: always
