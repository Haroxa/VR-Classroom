# 开发环境配置
spring:
  # 允许循环依赖
  main:
    allow-circular-references: true
  
  # 数据源配置
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vr_classroom?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&characterSetResults=utf-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # 热部署配置
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  
  # Redis 配置
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:123456}
    database: ${SPRING_REDIS_DATABASE:0}
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

# 日志配置
logging:
  level:
    root: info
    com.university.vrclassroombackend: debug
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
  
# 服务器配置
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400

# OSS配置
oss:
  endpoint: ${OSS_ENDPOINT}
  accessKeyId: ${OSS_ACCESS_KEY_ID}
  accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
  bucketName: ${OSS_BUCKET_NAME}

# 微信登录配置
wechat:
  appId: ${WECHAT_APP_ID}
  appSecret: ${WECHAT_APP_SECRET}
  code2SessionUrl: https://api.weixin.qq.com/sns/jscode2session



# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,env,metrics,info,beans
  endpoint:
    health:
      show-details: always
    env:
      show-values: always
