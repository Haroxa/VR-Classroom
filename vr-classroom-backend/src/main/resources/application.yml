# 公共配置
spring:
  application:
    name: vr-classroom-backend

  # 默认环境
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 允许循环依赖
  main:
    allow-circular-references: true

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2MB

# 订单配置
order:
  seat:
    price: 100000  # 座位单价（分），与数据库默认价格保持一致

