# 测试环境配置
spring:
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/vr_classroom_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&characterSetResults=utf-8
    username: root
    password: 123456
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  
  # 热部署配置
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

# 日志配置
logging:
  level:
    root: info
    com.university.vrclassroombackend: info
    org.hibernate.SQL: warn
    org.hibernate.type.descriptor.sql.BasicBinder: warn
  
# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400

# OSS配置
oss:
  endpoint: ${OSS_ENDPOINT}
  accessKeyId: ${OSS_ACCESS_KEY_ID}
  accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
  bucketName: ${OSS_BUCKET_NAME}
