# 测试环境配置
spring:
  # 允许循环依赖
  main:
    allow-circular-references: true
  
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/vr_classroom_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&characterSetResults=utf-8
    username: root
    password: 123456
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  
  # 热部署配置
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  
  # Redis 配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:123456}
    database: ${REDIS_DATABASE:0}
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

# 日志配置
logging:
  level:
    root: info
    com.university.vrclassroombackend: info
    org.hibernate.SQL: warn
    org.hibernate.type.descriptor.sql.BasicBinder: warn
  
# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400

# OSS配置
oss:
  endpoint: ${OSS_ENDPOINT}
  accessKeyId: ${OSS_ACCESS_KEY_ID}
  accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
  bucketName: ${OSS_BUCKET_NAME}

# 微信登录配置
wechat:
  appId: ${WECHAT_APP_ID}
  appSecret: ${WECHAT_APP_SECRET}
  code2SessionUrl: https://api.weixin.qq.com/sns/jscode2session

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:payment-producer-group}
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
  consumer:
    group: ${ROCKETMQ_CONSUMER_GROUP:payment-consumer-group}
    consume-thread-min: 20
    consume-thread-max: 64
    consume-message-batch-max-size: 1
