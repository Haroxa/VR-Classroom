# 生产环境配置
spring:
  # 允许循环依赖
  main:
    allow-circular-references: true

  # 数据源配置
  # 高并发优化 - HikariCP连接池配置（万人并发场景）
  datasource:
    url: jdbc:mysql://192.168.247.150:3306/cj_vr?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: cj
    password: WEOrMSs@rtDeMw@ItoN#_YkLhUyXj167Oq5nLPBvTSQKv06v
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: VRClassroomHikariCP

# Spring Cache配置
# TODO: 高并发优化 - 配置Redis缓存
# 优化建议：
# 1. 使用Redis作为缓存
# 2. 缓存过期时间设置为10分钟
# 3. 不缓存null值
# 预计提升：+200% QPS
cache:
  type: redis
  redis:
    time-to-live: 600000
    cache-null-values: false
    use-key-prefix: true
    key-prefix: "vr:"

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    # 关闭驼峰命名自动转换，使用数据库原生的列名
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 关闭表名下划线转换
      table-underline: false

  # 热部署配置
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  # Redis 配置
  # TODO: 高并发优化 - 增加Redis连接池配置
  # 优化建议：
  # 1. max-active: 50 (当前8)
  # 2. max-wait: 3000 (当前-1)
  # 3. max-idle: 20 (当前8)
  # 4. min-idle: 10 (当前0)
  # 预计提升：+50% Redis性能
  redis:
    host: redis
    port: 6379
    password:
    database: 0
    timeout: 10000
    lettuce:
      pool:
        max-active: 50
        max-wait: 3000
        max-idle: 20
        min-idle: 10

# 日志配置
logging:
  level:
    root: warn
    com.university.vrclassroombackend: info
    org.hibernate.SQL: error
    org.hibernate.type.descriptor.sql.BasicBinder: error

# 服务器配置
# 高并发优化 - Tomcat线程池配置（万人并发场景）
server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /
  tomcat:
    max-threads: 2000
    min-spare-threads: 200
    accept-count: 1000
    connection-timeout: 20000

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400

# OSS配置
oss:
  endpoint: ${OSS_ENDPOINT}
  accessKeyId: ${OSS_ACCESS_KEY_ID}
  accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
  bucketName: ${OSS_BUCKET_NAME}

# 微信登录配置
wechat:
  appId: ${WECHAT_APP_ID}
  appSecret: ${WECHAT_APP_SECRET}
  code2SessionUrl: https://api.weixin.qq.com/sns/jscode2session
  accessTokenUrl: https://api.weixin.qq.com/cgi-bin/token
  phoneNumberUrl: https://api.weixin.qq.com/wxa/business/getuserphonenumber

# 文件上传配置（生产环境使用服务器路径）
file:
  upload:
    # 本地临时路径
    path: ./uploads
    # 服务器实际存储路径（通过环境变量配置）
    server-path: ${FILE_UPLOAD_SERVER_PATH:/opt/1panel/apps/openresty/openresty/www/sites/vr-static/index}
    # 文件访问URL前缀（与Nginx配置保持一致）
    url: ${FILE_ACCESS_URL:/assets}
  static:
    # 静态资源映射路径
    path: ${FILE_STATIC_PATH:/assets/**}
    # 静态资源实际位置（file:前缀表示文件系统路径）
    location: ${FILE_STATIC_LOCATION:file:/opt/1panel/apps/openresty/openresty/www/sites/vr-static/index/}

# 安全配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
